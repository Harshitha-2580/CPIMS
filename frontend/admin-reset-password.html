<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NEC Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <link rel="stylesheet" href="assets/css/scrollCue.css">
    <link rel="stylesheet" href="assets/css/remixicon.css">
    <link rel="stylesheet" href="assets/css/flaticon.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/admin-theme.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="assets/img/crop_nec.png" type="image/x-icon" rel="icon">
</head>
<body>
    <div class="reset-password-container">
        <style>
            :root {
                --primaryColor: #001e43;
                --secondaryColor: #002a5c;
                --accentColor: #003580;
                --lightGray: #f8f9fa;
                --borderColor: #e9ecef;
                --shadowColor: rgba(0, 30, 67, 0.1);
                --gradientPrimary: linear-gradient(135deg, #001e43, #002a5c);
                --gradientSecondary: linear-gradient(135deg, #002a5c, #003580);
            }

            body {
                padding-top: 0;
                overflow-x: hidden;
                background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            }

            .reset-password-container {
                width: 100%;
                max-width: 500px;
                padding: 20px;
            }

            .reset-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(20px);
                border-radius: 24px;
                border: 1px solid rgba(0, 30, 67, 0.1);
                box-shadow: 0 20px 60px rgba(0, 30, 67, 0.08);
                overflow: hidden;
                animation: cardSlideIn 0.8s ease-out;
            }

            .reset-header {
                background: var(--gradientPrimary);
                padding: 40px 28px;
                color: white;
                position: relative;
                overflow: hidden;
                text-align: center;
            }

            .reset-header::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
                animation: shimmer 4s infinite;
            }

            .reset-header h1 {
                font-size: 32px;
                font-weight: 800;
                margin: 0 0 10px 0;
                position: relative;
                z-index: 1;
                color: #ffffff;
                text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            }

            .reset-header p {
                font-size: 16px;
                margin: 0;
                opacity: 0.95;
                position: relative;
                z-index: 1;
            }

            .reset-header-icon {
                font-size: 48px;
                margin-bottom: 12px;
                position: relative;
                z-index: 1;
                animation: iconBounce 3s ease-in-out infinite;
            }

            .reset-body {
                padding: 36px 28px;
            }

            .reset-body h2 {
                color: var(--primaryColor);
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 10px;
            }

            .reset-description {
                color: #666;
                font-size: 14px;
                margin-bottom: 24px;
                line-height: 1.6;
            }

            #resetPasswordForm .form-label {
                font-weight: 600;
                color: var(--primaryColor);
                margin-bottom: 8px;
                letter-spacing: 0.2px;
                font-size: 15px;
            }

            #resetPasswordForm .form-control {
                border-radius: 12px;
                border: 1.5px solid #e3e8f0;
                padding: 12px 16px;
                font-size: 16px;
                background: #fafbfc;
                transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
                color: var(--primaryColor);
                margin-bottom: 16px;
            }

            #resetPasswordForm .form-control:focus {
                border-color: var(--accentColor);
                box-shadow: 0 0 0 3px rgba(0, 53, 128, 0.08);
                background: #ffffff;
            }

            #resetPasswordForm .form-control::placeholder {
                color: #999;
            }

            .password-strength {
                margin-bottom: 16px;
            }

            .strength-bar {
                height: 6px;
                background: #e3e8f0;
                border-radius: 20px;
                overflow: hidden;
                margin-bottom: 8px;
            }

            .strength-fill {
                height: 100%;
                width: 0%;
                border-radius: 20px;
                transition: all 0.3s ease;
            }

            .strength-fill.weak {
                width: 33%;
                background: #ef4444;
            }

            .strength-fill.medium {
                width: 66%;
                background: #f59e0b;
            }

            .strength-fill.strong {
                width: 100%;
                background: #10b981;
            }

            .strength-text {
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .strength-text.weak {
                color: #ef4444;
            }

            .strength-text.medium {
                color: #f59e0b;
            }

            .strength-text.strong {
                color: #10b981;
            }

            #resetPasswordForm .btn-primary {
                background: var(--gradientPrimary);
                border: none;
                border-radius: 12px;
                font-weight: 700;
                font-size: 16px;
                padding: 14px 0;
                width: 100%;
                box-shadow: 0 8px 24px rgba(0, 30, 67, 0.15);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                color: #ffffff;
                cursor: pointer;
                position: relative;
                overflow: hidden;
            }

            #resetPasswordForm .btn-primary::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                transition: left 0.5s;
            }

            #resetPasswordForm .btn-primary:hover:not(:disabled) {
                background: var(--gradientSecondary);
                box-shadow: 0 12px 36px rgba(0, 30, 67, 0.25);
                transform: translateY(-2px);
            }

            #resetPasswordForm .btn-primary:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .reset-message {
                padding: 14px 16px;
                border-radius: 12px;
                border-left: 4px solid transparent;
                animation: messageSlideIn 0.3s ease-out;
                margin-bottom: 16px;
                display: none;
            }

            .reset-message.success {
                display: block;
                background: rgba(34, 197, 94, 0.1);
                color: #16a34a;
                border-left-color: #16a34a;
            }

            .reset-message.error {
                display: block;
                background: rgba(239, 68, 68, 0.1);
                color: #dc2626;
                border-left-color: #dc2626;
            }

            .reset-footer {
                padding: 16px 28px;
                background: linear-gradient(135deg, rgba(0, 30, 67, 0.02), rgba(0, 42, 92, 0.02));
                text-align: center;
                border-top: 1px solid rgba(0, 30, 67, 0.08);
                font-size: 13px;
                color: #666;
            }

            .reset-footer a {
                color: var(--accentColor);
                text-decoration: none;
                font-weight: 600;
                transition: color 0.2s;
            }

            .reset-footer a:hover {
                color: var(--primaryColor);
            }

            @keyframes cardSlideIn {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes shimmer {
                0% { left: -100%; }
                100% { left: 100%; }
            }

            @keyframes iconBounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }

            @keyframes messageSlideIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }

            @media (max-width: 480px) {
                .reset-header {
                    padding: 32px 20px;
                }

                .reset-header h1 {
                    font-size: 26px;
                }

                .reset-body {
                    padding: 28px 20px;
                }

                .reset-container {
                    max-width: 100%;
                }
            }
        </style>

        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-header-icon">
                    <i class="ri-lock-line"></i>
                </div>
                <h1>Reset Password</h1>
                <p>Create a new secure password for your admin account</p>
            </div>

            <div class="reset-body">
                <div id="resetMessage" class="reset-message"></div>

                <form id="resetPasswordForm">
                    <h2>Set New Password</h2>
                    <p class="reset-description">Please enter a strong password that you'll use to access your admin account.</p>

                    <input type="hidden" id="resetToken" value="">

                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="newPassword" 
                            placeholder="Enter strong password"
                            required
                            minlength="8"
                        >
                    </div>

                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password strength will appear here</div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmPassword" 
                            placeholder="Re-enter password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="ri-shield-check-line" style="margin-right: 6px;"></i>
                        Reset Password
                    </button>
                </form>
            </div>

            <div class="reset-footer">
                <p style="margin: 0;">
                    <i class="ri-information-line" style="margin-right: 4px;"></i>
                    This reset link will expire in 24 hours
                </p>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        
        if (!resetToken) {
            showMessage('Invalid or missing reset token. Please check your email link.', 'error');
            document.getElementById('resetPasswordForm').style.display = 'none';
        } else {
            document.getElementById('resetToken').value = resetToken;
        }

        // Password strength checker
        const passwordInput = document.getElementById('newPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;

            // Length check
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (password.length >= 16) strength++;

            // Character variety checks
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            // Update strength indicator
            strengthFill.className = 'strength-fill';
            strengthText.className = 'strength-text';

            if (strength < 3) {
                strengthFill.classList.add('weak');
                strengthText.classList.add('weak');
                strengthText.textContent = 'Weak Password';
            } else if (strength < 5) {
                strengthFill.classList.add('medium');
                strengthText.classList.add('medium');
                strengthText.textContent = 'Medium Password';
            } else {
                strengthFill.classList.add('strong');
                strengthText.classList.add('strong');
                strengthText.textContent = 'Strong Password';
            }
        });

        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const token = document.getElementById('resetToken').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            // Validate password strength
            if (newPassword.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }

            const submitBtn = document.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ri-loader-4-line" style="animation: spin 1s linear infinite; margin-right: 6px;"></i>Resetting...';

            try {
                const response = await fetch('/api/admin/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token,
                        newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login-admin.html';
                    }, 2000);
                } else {
                    showMessage('❌ ' + (data.message || 'Failed to reset password'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        function showMessage(message, type) {
            const msgDiv = document.getElementById('resetMessage');
            msgDiv.className = 'reset-message ' + type;
            msgDiv.innerHTML = message;
            msgDiv.style.display = 'block';
        }
    </script>
</body>
</html>
