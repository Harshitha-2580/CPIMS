<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEC - Edit Personal Profile</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/remixicon.css">
    <link rel="stylesheet" href="assets/css/flaticon.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="assets/img/crop_nec.png" type="image/x-icon" rel="icon">

    <style>
        .edit-profile-card {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .form-label { font-weight: 600; color: #172b4d; margin-bottom: 8px; }
        .form-control:focus { border-color: #ff5722; box-shadow: none; }
        .toast-container {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 9999;
        }
        .toast-message {
            background: #28a745;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            display: none;
        }
        .toast-message.show {
            display: block;
            animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(10px); }
        }
    </style>
</head>
<body>

    <div class="top-header-area style-2" style="padding: 12px 0;">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 text-center">
                    <h3 class="mb-0" style="color: #fff; font-weight: 700; letter-spacing: 1px; line-height: 1.4; font-size: 26px;">
                        <span style="font-family: 'Poppins', ; font-size: 36px; font-weight: 700;"> NEC
                        </span>
                        - Central Placement and Information Center
                    </h3>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-light py-2" id="navbar">
        <div class="container">
            <img src="assets/img/logo_necn.png" alt="Logo" height="70" width="160">
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="student-profile.html" class="nav-link active">Back to Profile</a></li>
                    <li class="nav-item"><a href="index.html" class="nav-link">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="register-area ptb-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="edit-profile-card student-summary-box">
                        <div class="section-title text-center mb-4">
                            <h2>Edit Personal Information</h2>
                            <p>Update your display name, contact details, and profile picture.</p>
                        </div>

                        <form id="editProfileForm" enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="editName" placeholder="Your name" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
                                    <small class="text-muted">Name cannot be changed.</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" name="email" id="editEmail" readonly style="background-color: #f8f9fa;">
                                    <small class="text-muted">Email cannot be changed.</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="text" class="form-control" name="phone" id="editPhone" placeholder="+91 XXXXX XXXXX">
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="default-btn border-0">
                                    Save Changes <i class="ri-save-line"></i>
                                </button>
                                <a href="student-profile.html" class="btn btn-link text-muted mt-2 d-block">Cancel and Go Back</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-area pt-100 pb-75">
        </div>
    <div class="toast-container">
        <div id="successToast" class="toast-message">Updated successfully</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            const studentId = (sessionStorage.getItem("student_id") || localStorage.getItem("student_id"));
            if (!studentId) { window.location.href = "login-student.html"; return; }

            // 1. Fetch current data to pre-fill
            try {
                const res = await fetch(`http://localhost:3000/api/student/${studentId}`);
                const data = await res.json();
                if(data.success) {
                    const s = data.student;
                    document.getElementById('editName').value = s.name || "";
                    document.getElementById('editEmail').value = s.email || "";
                    document.getElementById('editPhone').value = s.phone || "";
                }
            } catch (err) { console.error("Error loading data", err); }

            // 2. Handle Submit
            document.getElementById('editProfileForm').onsubmit = async (e) => {
                e.preventDefault();
                
                const phone = document.getElementById('editPhone').value.trim();
                
                // Create form data manually (exclude name)
                const formData = new FormData();
                formData.append('phone', phone);

                const showToast = (message) => {
                    const toast = document.getElementById("successToast");
                    if (!toast) return;
                    toast.textContent = message;
                    toast.classList.remove("show");
                    void toast.offsetWidth;
                    toast.classList.add("show");
                };

                try {
                    console.log('Submitting personal info update...');
                    const response = await fetch(`http://localhost:3000/api/student/${studentId}/update-personal`, {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    console.log('Response:', result);
                    
                    if(result.success) {
                        showToast("Personal info updated successfully");
                        setTimeout(() => {
                            window.location.href = "student-profile.html";
                        }, 1200);
                    } else {
                        alert("Update failed: " + (result.message || 'Unknown error'));
                    }
                } catch (err) { 
                    console.error('Error:', err);
                    alert("Error connecting to server: " + err.message); 
                }
            };
        });
    </script>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth-session-manager.js"></script>
<script src="assets/js/student-session-bootstrap.js"></script>
<script src="assets/js/custom.js"></script>
    <script src="assets/js/student-sidebar.js?v=20260315"></script>
</body>
</html>
