        .profile-name {

        .profile-subtitle {
            color: #5f6f84;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 4px 14px;
            font-size: 14px;
        }

        .info-grid p {
            margin: 0;
            padding: 6px 0;
            border-bottom: 1px solid #f0f4f9;
        }

        .info-row-label {
            color: #53657c;
            font-weight: 600;
            margin-right: 6px;
        }


        .priv-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border: 1px solid #e3ebf5;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #f8fbff;
        }

        .priv-row:last-child {
            margin-bottom: 0;
        }

        .priv-row-label {
            font-size: 13px;
            font-weight: 600;
            color: #1f3754;
        }

        .priv-badge-granted {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: #d1fae5;
            color: #065f46;
        }

        .priv-badge-denied {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: #fee2e2;
            color: #991b1b;
        }

        .profile-section-title {
            font-size: 20px;
            font-weight: 700;
            color: #001e43;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #001e43;
        }

        .form-control, .form-select {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: 14px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #001e43;
            box-shadow: 0 0 0 3px rgba(0, 30, 67, 0.1);
        }

        .form-label {
            font-weight: 600;
            color: #001e43;
            margin-bottom: 8px;
            font-size: 14px;
        }

        @media (max-width: 767.98px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

    <script>
        // Load faculty profile data
        async function loadProfileData() {
            const facultyId = (sessionStorage.getItem('faculty_id') || localStorage.getItem('faculty_id'));
            const facultyCampusType = (sessionStorage.getItem('faculty_campus_type') || localStorage.getItem('faculty_campus_type')) || 'NECN';
            console.log('Faculty ID:', facultyId);
            
            if (!facultyId) {
                console.warn('No faculty ID found in localStorage. Redirecting to login...');
                window.location.href = 'login-faculty.html';
                return;
            }

            let profileData = null;

            try {
                const profileRes = await fetch(`/api/faculty/profile/${facultyId}?campus=${facultyCampusType}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                profileData = await profileRes.json();
            } catch (err) {
                console.error('Error fetching from API:', err);
                profileData = null;
            }

            // Use API data if successful, otherwise fall back to localStorage
            let faculty = null;

            if (profileData && profileData.success && profileData.faculty) {
                faculty = profileData.faculty;
            } else {
                // Fallback to localStorage
                console.log('API failed, using localStorage fallback');
                faculty = {
                    name: (sessionStorage.getItem('faculty_name') || localStorage.getItem('faculty_name')) || 'Faculty',
                    email: (sessionStorage.getItem('faculty_email') || localStorage.getItem('faculty_email')) || 'N/A',
                    phone: (sessionStorage.getItem('faculty_phone') || localStorage.getItem('faculty_phone')) || 'N/A',
                    designation: (sessionStorage.getItem('faculty_designation') || localStorage.getItem('faculty_designation')) || 'Faculty Member',
                    department: (sessionStorage.getItem('faculty_department') || localStorage.getItem('faculty_department')) || 'N/A',
                    qualification: (sessionStorage.getItem('faculty_qualification') || localStorage.getItem('faculty_qualification')) || 'N/A'
                };
                mentees = '0';
                placedCount = '0';
                eventsCount = '0';
            }

            // Update display
            document.getElementById('heroFacultyName').textContent = faculty.name || 'Faculty';
            document.getElementById('heroFacultyDesignation').textContent = faculty.designation || '';

            // Avatar initials (up to 2 letters)
            const initials = (faculty.name || 'F').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
            document.getElementById('facultyInitials').textContent = initials;

            // Card header
            document.getElementById('displayName').textContent = faculty.name || 'Faculty';
            document.getElementById('displayDesignation').textContent = faculty.designation || 'Faculty Member';

            // Info grid
            document.getElementById('infoFacultyId').textContent = faculty.faculty_id || 'N/A';
            document.getElementById('infoEmail').textContent = faculty.email || 'N/A';
            document.getElementById('infoPhone').textContent = faculty.phone || 'N/A';
            document.getElementById('infoCampusType').textContent = faculty.campus_type || facultyCampusType || 'N/A';
            document.getElementById('infoDepartment').textContent = faculty.department || 'N/A';
            document.getElementById('infoDesignation').textContent = faculty.designation || 'N/A';

            // Render privilege badges from raw DB columns
            const privLabels = {
                can_post_events: 'Post Events',
                can_upload_resources: 'Upload Resources',
                can_post_internships: 'Post Internships',
                can_monitor_assigned_drives: 'Monitor Assigned Drives'
            };
            const chips = Object.keys(privLabels).map(col => {
                const granted = Boolean(faculty[col]);
                const badgeCls = granted ? 'priv-badge-granted' : 'priv-badge-denied';
                const badgeText = granted ? 'Granted' : 'Not Granted';
                return `<div class="priv-row"><span class="priv-row-label">${privLabels[col]}</span><span class="${badgeCls}">${badgeText}</span></div>`;
            }).join('');
            document.getElementById('privilegesList').innerHTML = chips;

            console.log('Profile loaded');
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadProfileData);

        // Sticky navbar functionality
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('navbar');
            const topHeader = document.querySelector('.top-header-area');
            if (!navbar || !topHeader) {
                return;
            }
            const topHeaderHeight = topHeader.offsetHeight;

            if (window.scrollY >= topHeaderHeight) {
                navbar.classList.add('sticky');
                document.body.classList.add('navbar-sticky');
            } else {
                navbar.classList.remove('sticky');
                document.body.classList.remove('navbar-sticky');
            }
        });
    </script>
