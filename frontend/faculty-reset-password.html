<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEC Placement Cell - Set Your Password</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <style>
        body, html {
            overflow-x: hidden;
        }

        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001e43 0%, #0d47a1 100%);
            padding: 40px 20px;
            margin-top: 100px;
        }

        .reset-form-wrapper {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .reset-form-wrapper h2 {
            text-align: center;
            color: #001e43;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 28px;
        }

        .reset-form-wrapper p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0d47a1;
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1);
        }

        .btn-reset {
            width: 100%;
            padding: 13px;
            border: none;
            background: linear-gradient(135deg, #001e43 0%, #0d47a1 100%);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13, 71, 161, 0.3);
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #388e3c;
            font-size: 13px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d47a1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        .requirement {
            padding: 5px 0;
        }

        .requirement.met {
            color: #388e3c;
        }

        #navbar img {
            max-width: 100%;
            height: auto;
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="assets/img/crop_nec.png" type="image/x-icon" rel="icon">
</head>
<body>

    <!-- Top Header Area -->
    <div class="top-header-area style-2" style="padding: 12px 0;">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 text-center">
                    <h3 class="mb-0" style="color: #fff; font-weight: 700; letter-spacing: 1px; line-height: 1.4; font-size: 26px;">
                        <span style="font-family: 'Poppins', ; font-size: 36px; font-weight: 700;"> NEC
                        </span>
                        – Central Placement and Information Center
                    </h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light py-2" id="navbar">
        <div class="container">
            <img src="assets/img/logo_necn.png" alt="Logo" height="70" width="160">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Password Reset Section -->
    <div class="reset-container">
        <div class="reset-form-wrapper">
            <h2>Set Your Password</h2>
            <p>Create a secure password for your faculty account</p>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Enter password (min 8 characters)" required>
                </div>

                <div class="form-group">
                    <label for="passwordConfirm">Confirm Password</label>
                    <input type="password" id="passwordConfirm" placeholder="Re-enter password" required>
                </div>

                <div class="password-requirements">
                    <div class="requirement" id="reqLength">
                        ✓ At least 8 characters
                    </div>
                    <div class="requirement" id="reqMatch">
                        ✓ Passwords match
                    </div>
                </div>

                <button type="submit" class="btn-reset" style="margin-top: 20px;">Set Password</button>
            </form>

            <div class="loading" id="resetLoading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Setting password...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-area pt-100 pb-75">
        <div class="container">
            <div class="row align-items-start">
                <div class="col-lg-12">
                    <div class="single-footer-widget about text-center">
                        <p>© <strong>NEC</strong> Placement & Career Cell. All Rights Reserved.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('errorMessage').textContent = 'Invalid or missing reset token. Please request a new one.';
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('resetForm').style.display = 'none';
        }

        // Password validation
        document.getElementById('password').addEventListener('input', validatePassword);
        document.getElementById('passwordConfirm').addEventListener('input', validatePassword);

        function validatePassword() {
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            // Check length
            const lengthValid = password.length >= 8;
            const lengthReq = document.getElementById('reqLength');
            if (lengthValid) {
                lengthReq.classList.add('met');
            } else {
                lengthReq.classList.remove('met');
            }

            // Check match
            const matchValid = password === passwordConfirm && password.length > 0;
            const matchReq = document.getElementById('reqMatch');
            if (matchValid) {
                matchReq.classList.add('met');
            } else {
                matchReq.classList.remove('met');
            }

            // Enable/disable submit button
            const submitBtn = document.querySelector('.btn-reset');
            submitBtn.disabled = !(lengthValid && matchValid);
        }

        // Form submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const password_confirm = document.getElementById('passwordConfirm').value;

            if (password !== password_confirm) {
                document.getElementById('errorMessage').textContent = 'Passwords do not match';
                document.getElementById('errorMessage').classList.add('show');
                return;
            }

            if (password.length < 8) {
                document.getElementById('errorMessage').textContent = 'Password must be at least 8 characters';
                document.getElementById('errorMessage').classList.add('show');
                return;
            }

            document.getElementById('resetLoading').style.display = 'block';

            try {
                const response = await fetch('/api/faculty/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, password_confirm })
                });

                const data = await response.json();
                document.getElementById('resetLoading').style.display = 'none';

                if (data.success) {
                    document.getElementById('successMessage').textContent = '✓ Password set successfully!';
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('resetForm').style.display = 'none';
                } else {
                    document.getElementById('errorMessage').textContent = data.message || 'Failed to set password';
                    document.getElementById('errorMessage').classList.add('show');
                }
            } catch (err) {
                document.getElementById('resetLoading').style.display = 'none';
                document.getElementById('errorMessage').textContent = 'Server error. Please try again.';
                document.getElementById('errorMessage').classList.add('show');
            }
        });
    </script>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
