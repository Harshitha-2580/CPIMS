<!DOCTYPE html>
<html lang="zxx">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEC Placement Cell - Attendance QR</title>

  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
  <link rel="stylesheet" href="assets/css/scrollCue.css" />
  <link rel="stylesheet" href="assets/css/remixicon.css" />
  <link rel="stylesheet" href="assets/css/flaticon.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <link href="assets/img/crop_nec.png" type="image/x-icon" rel="icon" />

  <style>
    :root {
      --primaryColor: #001e43;
      --secenderyColor: #002a5c;
      --darkColor: rgb(0, 30, 67);
      --accentColor: #003580;
      --shadowColor: rgba(0, 30, 67, 0.14);
      --background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
    }

    body {
      padding-top: 0;
      background: var(--background);
      overflow-x: hidden;
    }

    html { overflow-x: hidden; }

    .student-page-hero {
      border-radius: 14px;
      background: linear-gradient(135deg, #001e43 0%, #002a5c 100%);
      color: #ffffff;
      padding: 40px 0 34px;
      margin-bottom: 36px;
      box-shadow: 0 12px 30px rgba(0, 30, 67, 0.25);
    }

    .student-page-hero-title {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .student-page-hero-subtitle {
      color: rgba(255,255,255,.93);
      font-size: 1.1rem;
      margin-top: 8px;
      max-width: 630px;
    }

    .dashboard-cards-container {
      padding: 30px 0 60px;
      min-height: calc(100vh - 220px);
    }

    .main-content-wrapper {
      margin-left: 240px;
      max-width: calc(100% - 240px);
      transition: margin-left .3s cubic-bezier(.4,0,.2,1);
    }

    .student-sidebar.collapsed ~ .main-content-wrapper,
    body.student-sidebar-collapsed .main-content-wrapper {
      margin-left: 68px;
      max-width: calc(100% - 68px);
    }

    /* Fallback to avoid extra left gap on student-attendance */
    body .main-content-wrapper {
      margin-left: 78px !important;
      max-width: calc(100% - 78px) !important;
    }

    .dashboard-cards-container .container {
      max-width: 100%;
      padding: 0 15px;
    }

    .dashboard-cards-container .row { gap: 18px; }

    .dashboard-card {
      background: #ffffff;
      border-radius: 13px;
      box-shadow: 0 6px 25px rgba(20,34,63,0.1);
      border: 1px solid #e8edf6;
      padding: 22px;
      transition: transform .3s ease, box-shadow .3s ease;
      width: 100%;
    }

    .dashboard-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(20,34,63,0.18);
    }

    .dashboard-card h4 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #001e43;
      margin-bottom: 6px;
    }

    .dashboard-card .card-subtitle {
      color: #4f5d78;
      font-size: 0.93rem;
      margin-bottom: 12px;
    }

    .dashboard-card .qr-code img {
      width: 230px;
      max-width: 100%;
      margin: 12px 0;
    }

    .dashboard-card .status-badge {
      display: inline-block;
      background-color: #d6f7e5;
      color: #0f8b54;
      padding: 5px 10px;
      font-size: 0.84rem;
      font-weight: 600;
      border-radius: 50px;
    }

    .student-page-inner {
      padding: 0;
    }

  </style>
</head>
<body>
  <div class="top-header-area style-2" style="padding: 12px 0;">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-12 text-center">
          <h3 class="mb-0" style="color:#fff;font-weight:700;letter-spacing:1px;line-height:1.4;font-size:26px;">
            <span style="font-family:'Poppins';font-size:36px;font-weight:700;">NEC</span> – Central Placement Information and Management Center
          </h3>
        </div>
      </div>
    </div>
  </div>

  <div class="header-welcome-gap" aria-hidden="true"></div>

  <div class="main-content-wrapper">
    <div class="student-page-hero">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-lg-8">
            <div class="student-page-hero-content">
              <h2 class="student-page-hero-title">My Attendance QR Codes</h2>
              <p class="student-page-hero-subtitle">Show these QR codes to mark your attendance in registered ongoing placement drives.</p>
            </div>
          </div>
          <div class="col-lg-4 text-center">
            <div class="student-page-hero-visual">
              <i class="ri-qr-code-line"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="dashboard-cards-container">
      <div class="container">
       
        <div id="qr-codes-container" class="row">
          <div class="col-12 text-center">
            <div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>
            <p class="mt-2">Loading your registered ongoing drives...</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/swiper-bundle.min.js"></script>
  <script src="assets/js/scrollCue.min.js"></script>
  <script src="assets/js/auth-session-manager.js"></script>
<script src="assets/js/student-session-bootstrap.js"></script>
<script src="assets/js/custom.js"></script>
  <script src="assets/js/student-sidebar.js?v=20260316"></script>

  <script>
    const studentId = (sessionStorage.getItem('student_id') || localStorage.getItem('student_id')) || 1;

    async function loadAttendanceQRs() {
      const container = document.getElementById('qr-codes-container');
      try {
        console.log('[Attendance] Loading QRs for student:', studentId);
        const response = await fetch(`/api/student/${studentId}/registered-ongoing-drives`);
        const data = await response.json();
        console.log('[Attendance] Response:', data);
        const drives = data.drives || [];
        console.log('[Attendance] Total drives:', drives.length);

        if (drives.length === 0) {
          container.innerHTML = '<div class="alert alert-info w-100">No ongoing registered drives found. Apply for a drive to get your attendance QR.</div>';   
          return;
        }

        let html = '';
        for (const drive of drives) {
          console.log('[Attendance] Processing drive:', drive);
          const qrResponse = await fetch(`/api/attendance/qr/${studentId}/${drive.opportunity_id}`);
          const qrData = await qrResponse.json();
          console.log('[Attendance] QR generated:', qrData);
          const driveDate = drive.due_date ? new Date(drive.due_date).toLocaleString() : '--';
          html += `
            <div class="col-lg-4 col-md-6">
              <div class="dashboard-card">
                <div class="card-content">
                  <h4>${qrData.opportunity.title || qrData.opportunity.company_name || 'Placement Drive'}</h4>
                  <div class="card-subtitle">${qrData.opportunity.company_name || 'N/A'}</div>
                  <div style="font-size: 14px; color: #67748e; margin-bottom: 13px;">${driveDate}</div>
                  <div class="qr-code"><img src="${qrData.qrCode}" alt="Attendance QR"></div>
                  <div class="mb-2"><span class="status-badge">Registered</span></div>
                  <button class="btn btn-sm btn-outline-primary" onclick="refreshQR(${drive.opportunity_id})">Refresh QR</button>
                </div>
              </div>
            </div>
          `;
        }

        container.innerHTML = html;
      } catch (err) {
        console.error('Error loading QR codes:', err);
        container.innerHTML = '<div class="alert alert-danger w-100">Error loading QR codes, please refresh.</div>';
      }
    }

    async function refreshQR(opportunityId) {
      const response = await fetch(`/api/attendance/qr/${studentId}/${opportunityId}`);
      const qrData = await response.json();
      if (!qrData.qrCode) return;

      const cards = document.querySelectorAll('.qr-card');
      cards.forEach(card => {
        const forOpportunity = card.querySelector('button').getAttribute('onclick');
        if (forOpportunity.includes(`(${opportunityId})`)) {
          const img = card.querySelector('.qr-code img');
          if (img) img.src = qrData.qrCode;
        }
      });
    }

    document.addEventListener('DOMContentLoaded', loadAttendanceQRs);
  </script>
</body>
</html>
